<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Estimaciones SGR">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b212d"/>
      <stop offset="1" stop-color="#0d1015"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2c8ec0"/>
      <stop offset="1" stop-color="#7fd6ff"/>
    </linearGradient>
    <clipPath id="square">
      <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232"/>
    </clipPath>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>

  <!-- faint blueprint grid -->
  <g clip-path="url(#square)" stroke="#4cc2ff" stroke-opacity="0.07" stroke-width="2">
    <line x1="128" y1="0" x2="128" y2="1024"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="384" y1="0" x2="384" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="640" y1="0" x2="640" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="896" y1="0" x2="896" y2="1024"/>
    <line x1="0" y1="128" x2="1024" y2="128"/>
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="384" x2="1024" y2="384"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="640" x2="1024" y2="640"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="0" y1="896" x2="1024" y2="896"/>
  </g>

  <!-- ascending estimation bars -->
  <g>
    <rect x="392" y="556" width="86" height="156" rx="14" fill="url(#bar)"/>
    <rect x="508" y="452" width="86" height="260" rx="14" fill="url(#bar)"/>
    <rect x="624" y="344" width="86" height="368" rx="14" fill="url(#bar)"/>
  </g>

  <!-- carpenter's square (L ruler) -->
  <g fill="#4cc2ff">
    <rect x="240" y="240" width="84" height="544" rx="10"/>
    <rect x="240" y="700" width="544" height="84" rx="10"/>
  </g>

  <!-- engraved ruler ticks -->
  <g stroke="#0f1115" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round">
    <!-- vertical arm ticks (inner edge x=324) -->
    <line x1="296" y1="300" x2="324" y2="300"/>
    <line x1="306" y1="360" x2="324" y2="360"/>
    <line x1="296" y1="420" x2="324" y2="420"/>
    <line x1="306" y1="480" x2="324" y2="480"/>
    <line x1="296" y1="540" x2="324" y2="540"/>
    <line x1="306" y1="600" x2="324" y2="600"/>
    <line x1="296" y1="660" x2="324" y2="660"/>
    <!-- horizontal arm ticks (top edge y=700) -->
    <line x1="400" y1="700" x2="400" y2="728"/>
    <line x1="460" y1="700" x2="460" y2="718"/>
    <line x1="520" y1="700" x2="520" y2="728"/>
    <line x1="580" y1="700" x2="580" y2="718"/>
    <line x1="640" y1="700" x2="640" y2="728"/>
    <line x1="700" y1="700" x2="700" y2="718"/>
    <line x1="760" y1="700" x2="760" y2="728"/>
  </g>
</svg>
