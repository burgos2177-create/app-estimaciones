<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimaciones de Obra</title>
  <link rel="stylesheet" href="css/main.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script type="module">
    // Service worker network-first: garantiza que SIEMPRE cargues el código
    // más reciente del servidor (no solo main.js, sino todo el grafo de
    // módulos). updateViaCache:'none' evita que el propio sw.js se cachee.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(() => {});
    }
    // Cache-bust del punto de entrada (respaldo si el SW aún no está activo).
    const v = Date.now();
    import('./js/main.js?v=' + v);
  </script>
</body>
</html>
